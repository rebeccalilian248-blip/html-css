<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1{ /* Box-level*/
            background-color: rgb(238, 177, 243);
            height: 300px;
            width:  300px;

            border: 10px solid deeppink;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed darkslateblue;
        } 
       
        a{ /* inline-level*/
            border: 10px solid violet;

            padding: 10px;
            
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Paragráfos também são exemplos de box-level,mas os <a href="#"> links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona.</p>
</body>
</html>
